<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sorpresa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Librería para el confeti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  
  <style>
    :root {
      --primary: #ff4d6d;
      --bg: #1a0b1c;
      --text: #fff;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background-color: var(--bg);
      background-image: radial-gradient(circle at center, #3a0ca3 0%, var(--bg) 100%);
      font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', sans-serif; /* Un toque más informal/cute */
      color: var(--text);
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* --- PANTALLAS DE OVERLAY --- */
    #start-screen, #video-screen {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.5s ease;
    }

    #video-screen {
      background: #000;
      z-index: 999;
    }

    #intro-video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .btn {
      padding: 15px 30px;
      font-size: 1.2rem;
      font-weight: bold;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255, 77, 109, 0.5);
      transition: transform 0.2s, background 0.2s;
    }
    .btn:hover {
      transform: scale(1.05);
      background: #ff1e46;
    }

    #skip-btn {
      position: absolute;
      bottom: 30px;
      right: 30px;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(5px);
    }

    /* --- CONTENIDO PRINCIPAL --- */
    #main-content {
      display: none;
      padding: 2rem;
      text-align: center;
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      margin-bottom: 2rem;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      background: -webkit-linear-gradient(#ff4d6d, #ffb3c1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    /* GRID DE FOTOS TIPO POLAROID */
    .album-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 30px;
      padding: 20px;
    }

    .polaroid {
      background: white;
      padding: 15px 15px 40px 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.4);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      position: relative;
    }
    
    .polaroid img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      background: #eee; /* placeholder color */
    }

    .polaroid:hover {
      transform: scale(1.1) rotate(0deg) !important;
      z-index: 10;
      box-shadow: 0 15px 30px rgba(255, 77, 109, 0.4);
    }

    /* --- MODAL PARA FOTO + TEXTO --- */
    #modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: 20px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #modal.show {
      display: flex;
      opacity: 1;
    }

    #modal-content {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      max-width: 90vw;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 0 40px rgba(255, 77, 109, 0.5);
      position: relative;
    }

    #modal-img {
      max-width: 100%;
      max-height: 50vh;
      object-fit: contain;
      border-radius: 5px;
    }

    #modal-text {
      color: #333;
      margin-top: 20px;
      font-size: 1.2rem;
      text-align: center;
      font-weight: bold;
    }

    #close-modal {
      margin-top: 20px;
      background: #333;
    }

  </style>
</head>
<body>

  <!-- PANTALLA DE INICIO (Necesaria para que el navegador permita autoplay con sonido) -->
  <div id="start-screen">
    <button class="btn" id="start-btn">❤️ Tengo una sorpresa para ti ❤️</button>
  </div>

  <!-- PANTALLA DE VÍDEO INTRODUCTORIO -->
  <div id="video-screen" style="display: none;">
    <!-- PON AQUÍ LA RUTA DE TU VÍDEO -->
    <video id="intro-video" src="assets/video-intro.mp4" playsinline></video>
    <button class="btn" id="skip-btn">Saltar vídeo ⏭️</button>
  </div>

  <!-- CONTENIDO PRINCIPAL -->
  <div id="main-content">
    <h1>Álbum de recuerdos<br><span style="font-size: 0.5em; color: #ffb3c1;">(he hecho lo que he podido)</span></h1>
    <div class="album-grid" id="album-grid">
      <!-- Las fotos se generarán aquí por JavaScript -->
    </div>
  </div>

  <!-- MODAL DE VISUALIZACIÓN -->
  <div id="modal">
    <div id="modal-content">
      <img id="modal-img" src="" alt="Recuerdo">
      <p id="modal-text"></p>
      <button class="btn" id="close-modal">Cerrar</button>
      <audio id="modal-audio" src=""></audio>
    </div>
  </div>

  <script>
    /* =====================================================================
       CONFIGURACIÓN DE RECUERDOS (FOTOS, CANCIONES Y TEXTOS)
       - 'id': El nombre común para la foto y la canción (ej: 'viaje-paris')
       - 'imgExt': Extensión de la imagen (jpg, png, jpeg...)
       - 'audioExt': Extensión del audio (mp3, wav...)
       - 'text': El texto que saldrá debajo
       ===================================================================== */
    const recuerdos = [
      { id: "foto1", imgExt: "jpg", audioExt: "mp3", text: "¡Nuestro primer viaje juntos! Qué bien lo pasamos." },
      { id: "foto2", imgExt: "jpg", audioExt: "mp3", text: "Esa cena inolvidable..." },
      { id: "foto3", imgExt: "jpg", audioExt: "mp3", text: "Cuando nos perdimos buscando aquel sitio." },
      { id: "foto4", imgExt: "jpg", audioExt: "mp3", text: "Simplemente te quiero ❤️" }
      // Puedes añadir tantas como quieras aquí
    ];

    // Directorio donde estarán guardados los archivos (ej: extra/assets/)
    const ASSETS_PATH = "assets/";

    // Elementos del DOM
    const startScreen = document.getElementById('start-screen');
    const startBtn = document.getElementById('start-btn');
    
    const videoScreen = document.getElementById('video-screen');
    const introVideo = document.getElementById('intro-video');
    const skipBtn = document.getElementById('skip-btn');
    
    const mainContent = document.getElementById('main-content');
    const albumGrid = document.getElementById('album-grid');
    
    const modal = document.getElementById('modal');
    const modalImg = document.getElementById('modal-img');
    const modalText = document.getElementById('modal-text');
    const modalAudio = document.getElementById('modal-audio');
    const closeModalBtn = document.getElementById('close-modal');

    // 1. Iniciar la sorpresa (quitar pantalla de inicio y reproducir vídeo)
    startBtn.addEventListener('click', () => {
      startScreen.style.opacity = '0';
      setTimeout(() => {
        startScreen.style.display = 'none';
        videoScreen.style.display = 'flex';
        // Reproducimos el vídeo
        introVideo.play().catch(e => {
          console.log("Error reproduciendo vídeo:", e);
          terminarVideo(); // Si hay error, saltamos al álbum
        });
      }, 500);
    });

    // 2. Saltar vídeo o cuando el vídeo termine
    const terminarVideo = () => {
      introVideo.pause();
      videoScreen.style.opacity = '0';
      setTimeout(() => {
        videoScreen.style.display = 'none';
        mainContent.style.display = 'block';
        lanzarConfeti();
      }, 500);
    };

    skipBtn.addEventListener('click', terminarVideo);
    introVideo.addEventListener('ended', terminarVideo);

    // 3. Generar el confeti exagerado
    function lanzarConfeti() {
      var duration = 5 * 1000;
      var animationEnd = Date.now() + duration;
      var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

      function randomInRange(min, max) {
        return Math.random() * (max - min) + min;
      }

      var interval = setInterval(function() {
        var timeLeft = animationEnd - Date.now();

        if (timeLeft <= 0) {
          return clearInterval(interval);
        }

        var particleCount = 50 * (timeLeft / duration);
        confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
        confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
      }, 250);
    }

    // 4. Cargar el álbum
    recuerdos.forEach((recuerdo, index) => {
      const div = document.createElement('div');
      div.className = 'polaroid';
      
      // Inclinación aleatoria entre -10deg y 10deg para darle rollo álbum real
      const rotation = Math.random() * 20 - 10;
      div.style.transform = `rotate(${rotation}deg)`;

      const imgPath = `${ASSETS_PATH}${recuerdo.id}.${recuerdo.imgExt}`;
      const audioPath = `${ASSETS_PATH}${recuerdo.id}.${recuerdo.audioExt}`;

      div.innerHTML = `<img src="${imgPath}" alt="${recuerdo.id}" onerror="this.src='https://via.placeholder.com/400x400?text=Falta+Foto'">`;
      
      div.addEventListener('click', () => {
        abrirModal(imgPath, recuerdo.text, audioPath);
      });

      albumGrid.appendChild(div);
    });

    // 5. Lógica del Modal (Pop-up de la foto)
    function abrirModal(imgSrc, texto, audioSrc) {
      modalImg.src = imgSrc;
      modalText.textContent = texto;
      modalAudio.src = audioSrc;
      
      modal.classList.add('show');
      
      // Reproducir audio asociado
      modalAudio.play().catch(e => console.log("Error al reproducir audio o no existe.", e));
    }

    function cerrarModal() {
      modal.classList.remove('show');
      modalAudio.pause();
      modalAudio.currentTime = 0; // Reiniciar audio
      setTimeout(() => {
        modalImg.src = "";
      }, 300); // Esperar a que acabe la transición css
    }

    closeModalBtn.addEventListener('click', cerrarModal);
    
    // Cerrar si pinchan fuera de la foto
    modal.addEventListener('click', (e) => {
      if(e.target === modal) cerrarModal();
    });

  </script>
</body>
</html>
