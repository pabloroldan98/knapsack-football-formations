name: Manual Debug - Sofascore Endpoints

on:
  workflow_dispatch: # Allows manual triggering

jobs:
  # Baseline: plain GitHub Actions IP (Azure). Expected: all 403.
  debug-direct:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pre-load TLS client
        run: python -c "import tls_requests; tls_requests.get('https://httpbin.org/get', timeout=10)" > /dev/null 2>&1 || true

      - name: Debug Sofascore endpoints (direct)
        run: python -u ./scraping_tasks/debug_sofascore_endpoints.py

  # Route all traffic through Cloudflare WARP (WireGuard tunnel, free, no signup).
  debug-warp:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install WireGuard and wgcf
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard-tools resolvconf
          WGCF_VERSION=2.2.22
          curl -L -o wgcf "https://github.com/ViRb3/wgcf/releases/download/v${WGCF_VERSION}/wgcf_${WGCF_VERSION}_linux_amd64"
          chmod +x wgcf
          sudo mv wgcf /usr/local/bin/wgcf

      - name: Register and connect Cloudflare WARP
        run: |
          yes | wgcf register || true
          wgcf generate
          # wgcf writes a [Interface] without DNS sometimes; ensure a resolver
          sudo cp wgcf-profile.conf /etc/wireguard/warp.conf
          sudo wg-quick up warp
          echo "WARP tunnel up. Egress IP:"
          curl -s https://api.ipify.org || true
          echo ""

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pre-load TLS client
        run: python -c "import tls_requests; tls_requests.get('https://httpbin.org/get', timeout=10)" > /dev/null 2>&1 || true

      - name: Debug Sofascore endpoints (via WARP)
        run: python -u ./scraping_tasks/debug_sofascore_endpoints.py

      - name: Tear down WARP
        if: always()
        run: sudo wg-quick down warp || true

  # Route requests through the Tor SOCKS proxy (free). Likely blocked, quick to check.
  debug-tor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install and start Tor
        run: |
          sudo apt-get update
          sudo apt-get install -y tor
          sudo service tor start
          sleep 15
          echo "Tor egress IP:"
          curl -s --socks5-hostname 127.0.0.1:9050 https://api.ipify.org || true
          echo ""

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pre-load TLS client
        run: python -c "import tls_requests; tls_requests.get('https://httpbin.org/get', timeout=10)" > /dev/null 2>&1 || true

      - name: Debug Sofascore endpoints (via Tor)
        env:
          SOFASCORE_DEBUG_PROXY: socks5://127.0.0.1:9050
        run: python -u ./scraping_tasks/debug_sofascore_endpoints.py
