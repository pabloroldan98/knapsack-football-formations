name: Manual Debug - Sofascore Endpoints

on:
  workflow_dispatch: # Allows manual triggering

jobs:
  debug-endpoints:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Increase UDP buffer sizes (silence quic-go warning)
        run: |
          sudo sysctl -w net.core.rmem_max=7500000
          sudo sysctl -w net.core.wmem_max=7500000

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pre-load TLS client (suppress download progress)
        run: python -c "import tls_requests; tls_requests.get('https://httpbin.org/get', timeout=10)" > /dev/null 2>&1 || true

      - name: Debug Sofascore endpoints
        run: |
          python -u ./scraping_tasks/debug_sofascore_endpoints.py
